<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Добавить объект</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

<header class="app-header">
<a href="index.html" class="header-back">←</a>
<div class="header-title">Новый объект</div>
</header>

<div class="form-wrapper">

<input id="title" class="form-input" placeholder="Название">
<input id="price" type="number" class="form-input" placeholder="Цена">
<textarea id="description" class="form-input" placeholder="Описание"></textarea>
<input id="address" class="form-input" placeholder="Адрес">

<select id="category" class="form-input">
<option>Подвал</option>
<option>1 этаж</option>
<option>Магазин</option>
</select>

<input type="file" id="images" multiple class="form-input" accept="image/*">
<div id="preview" class="image-preview-grid"></div>

<button class="submit-btn" onclick="createObject()">
Сохранить объект
</button>

</div>
</div>

<script>
const API = "https://api.evgeny-ivanov-premises.ru";

const MAX_FILES = 10;
const MAX_FILE_SIZE = 12 * 1024 * 1024;

let imageFiles = [];
const preview = document.getElementById("preview");
const imageInput = document.getElementById("images");

/* ===== Sortable (правильная версия) ===== */
new Sortable(preview, {
  animation: 150,
  onEnd: function () {
    const newOrder = [];
    preview.querySelectorAll(".preview-item").forEach(item => {
      const fileId = item.dataset.id;
      const file = imageFiles.find(f => f._id === fileId);
      if (file) newOrder.push(file);
    });
    imageFiles = newOrder;
  }
});

/* ===== Загрузка файлов ===== */
imageInput.addEventListener("change", function() {

  const files = Array.from(this.files);

  if (imageFiles.length + files.length > MAX_FILES) {
    alert(`Максимум ${MAX_FILES} фотографий`);
    imageInput.value = "";
    return;
  }

  for (let file of files) {

    if (!file.type.startsWith("image/")) {
      alert("Можно загружать только изображения");
      continue;
    }

    if (file.size > MAX_FILE_SIZE) {
      alert(`Файл "${file.name}" превышает 12 МБ`);
      continue;
    }

    // создаём уникальный ID для сортировки
    file._id = crypto.randomUUID();
    imageFiles.push(file);
  }

  renderPreview();
  imageInput.value = "";
});

/* ===== Превью ===== */
function renderPreview() {
  preview.innerHTML = "";

  imageFiles.forEach((file) => {
    const reader = new FileReader();

    reader.onload = e => {
      const div = document.createElement("div");
      div.className = "preview-item";
      div.dataset.id = file._id;

      div.innerHTML = `
        <img src="${e.target.result}">
        <button type="button" class="remove-btn">×</button>
      `;

      div.querySelector(".remove-btn").onclick = () => {
        imageFiles = imageFiles.filter(f => f._id !== file._id);
        renderPreview();
      };

      preview.appendChild(div);
    };

    reader.readAsDataURL(file);
  });
}

/* ===== Создание объекта ===== */
async function createObject() {

  if (!title.value || !price.value) {
    alert("Заполните название и цену");
    return;
  }

  const formData = new FormData();

  formData.append("title", title.value);
  formData.append("price", price.value);
  formData.append("description", description.value);
  formData.append("address", address.value);
  formData.append("category", category.value);

  imageFiles.forEach(file => {
    formData.append("images", file);
  });

  try {
    const res = await fetch(API + "/objects", {
      method: "POST",
      body: formData,
      credentials: "include"
    });

    if (!res.ok) {
      alert("Ошибка создания объекта");
      return;
    }

    window.location.href = "index.html";

  } catch (err) {
    alert("Сервер недоступен");
  }
}
</script>

</body>
</html>
